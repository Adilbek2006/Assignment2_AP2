version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    environment:
      - DB_DSN=postgres://user:password@postgres:5432/payment_db?sslmode=disable
      - GRPC_PORT=50052
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "50052:50052"
    depends_on:
      - postgres
      - rabbitmq

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - rabbitmq